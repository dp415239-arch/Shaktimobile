<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Restore - SHAKTI MOBILE</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background: #0B111E; color: white; font-family: monospace; padding: 20px; }
        .card { background: #121A2E; border: 1px solid #1E293B; border-radius: 16px; padding: 20px; margin: 20px 0; }
        button { background: #10B981; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin: 5px; }
        button.danger { background: #EF4444; }
        pre { background: #0F172A; padding: 10px; border-radius: 8px; overflow-x: auto; font-size: 11px; }
        .success { color: #10B981; }
        .error { color: #EF4444; }
    </style>
</head>
<body class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold mb-4">🔄 SHAKTI MOBILE - Data Restore Tool</h1>
    
    <div class="card">
        <h2 class="text-lg font-bold mb-2">📦 Firebase Data Restore</h2>
        <p class="text-gray-400 text-sm mb-3">Click below to restore your data from Firebase server</p>
        <button onclick="restoreFromFirebase()" class="bg-blue-600 hover:bg-blue-700">🔄 Restore from Firebase</button>
        <button onclick="viewFirebaseData()" class="bg-gray-600">👁️ View Firebase Data</button>
        <div id="firebaseResult" class="mt-3 text-sm"></div>
    </div>

    <div class="card">
        <h2 class="text-lg font-bold mb-2">💾 Local Backup</h2>
        <p class="text-gray-400 text-sm mb-3">Download current data as backup</p>
        <button onclick="downloadBackup()" class="bg-emerald-600">📥 Download Backup</button>
        <button onclick="uploadBackup()" class="bg-amber-600">📤 Upload Backup File</button>
        <input type="file" id="backupFile" accept=".json" class="hidden" onchange="restoreFromFile(event)">
    </div>

    <div class="card">
        <h2 class="text-lg font-bold mb-2">📋 Current Data Status</h2>
        <div id="status"></div>
    </div>

    <script type="module">
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBFM1JgizFIwUtI2uX9tQ2ZWv2Mlb_RtHo",
            authDomain: "shakti-mobile-dashboard.firebaseapp.com",
            projectId: "shakti-mobile-dashboard",
            storageBucket: "shakti-mobile-dashboard.firebasestorage.app",
            messagingSenderId: "998376457559",
            appId: "1:998376457559:web:6c8a7ce0d47158fbbcea12"
        };

        let firebaseData = null;

        async function restoreFromFirebase() {
            const resultDiv = document.getElementById('firebaseResult');
            resultDiv.innerHTML = '<div class="text-yellow-400">⏳ Loading data from Firebase...</div>';
            
            try {
                const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js");
                const { getFirestore, doc, getDoc, setDoc } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
                
                const app = initializeApp(firebaseConfig);
                const db = getFirestore(app);
                const docRef = doc(db, "shaktiMobile", "dashboardData");
                const docSnap = await getDoc(docRef);
                
                if(docSnap.exists()) {
                    firebaseData = docSnap.data();
                    resultDiv.innerHTML = `<div class="success">✅ Data found in Firebase!</div>
                        <pre>${JSON.stringify(firebaseData, null, 2).substring(0, 500)}...</pre>
                        <div class="mt-2"><strong>Summary:</strong><br>
                        📦 Stock: ${Object.keys(firebaseData.inventory || {}).length} items<br>
                        💰 Sales: ${(firebaseData.salesData || []).length} records<br>
                        📕 Udhaar: ${(firebaseData.udhaarData || []).length} customers<br>
                        💸 Expenses: ${(firebaseData.expenseData || []).length} records
                        </div>
                        <button onclick="saveToLocalStorage()" class="bg-green-600 mt-3">💾 Save to LocalStorage (Restore)</button>`;
                } else {
                    resultDiv.innerHTML = '<div class="error">❌ No data found in Firebase! Have you ever saved data?</div>';
                }
            } catch(e) {
                resultDiv.innerHTML = `<div class="error">❌ Error: ${e.message}</div>`;
            }
        }

        window.saveToLocalStorage = function() {
            if(firebaseData) {
                localStorage.setItem('shakti_sales', JSON.stringify(firebaseData.salesData || []));
                localStorage.setItem('shakti_expense', JSON.stringify(firebaseData.expenseData || []));
                localStorage.setItem('shakti_inventory', JSON.stringify(firebaseData.inventory || {}));
                localStorage.setItem('shakti_udhaar', JSON.stringify(firebaseData.udhaarData || []));
                document.getElementById('firebaseResult').innerHTML += '<div class="success mt-2">✅ Data saved to LocalStorage! You can now go to main dashboard.</div>';
                showStatus();
            }
        };

        window.viewFirebaseData = async function() {
            const resultDiv = document.getElementById('firebaseResult');
            resultDiv.innerHTML = '<div class="text-yellow-400">⏳ Fetching...</div>';
            try {
                const response = await fetch('https://firestore.googleapis.com/v1/projects/shakti-mobile-dashboard/databases/(default)/documents/shaktiMobile/dashboardData');
                const data = await response.json();
                resultDiv.innerHTML = `<pre>${JSON.stringify(data, null, 2).substring(0, 1000)}</pre>`;
            } catch(e) {
                resultDiv.innerHTML = `<div class="error">Error: ${e.message}</div>`;
            }
        };

        window.downloadBackup = function() {
            const backup = {
                salesData: JSON.parse(localStorage.getItem('shakti_sales') || '[]'),
                expenseData: JSON.parse(localStorage.getItem('shakti_expense') || '[]'),
                inventory: JSON.parse(localStorage.getItem('shakti_inventory') || '{}'),
                udhaarData: JSON.parse(localStorage.getItem('shakti_udhaar') || '[]'),
                backupDate: new Date().toISOString()
            };
            const blob = new Blob([JSON.stringify(backup, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `shakti_backup_${new Date().toISOString().slice(0,19)}.json`;
            a.click();
            URL.revokeObjectURL(url);
        };

        window.uploadBackup = function() {
            document.getElementById('backupFile').click();
        };

        window.restoreFromFile = function(event) {
            const file = event.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const backup = JSON.parse(e.target.result);
                        if(backup.salesData) localStorage.setItem('shakti_sales', JSON.stringify(backup.salesData));
                        if(backup.expenseData) localStorage.setItem('shakti_expense', JSON.stringify(backup.expenseData));
                        if(backup.inventory) localStorage.setItem('shakti_inventory', JSON.stringify(backup.inventory));
                        if(backup.udhaarData) localStorage.setItem('shakti_udhaar', JSON.stringify(backup.udhaarData));
                        alert('✅ Backup restored successfully!');
                        showStatus();
                    } catch(e) { alert('Invalid backup file'); }
                };
                reader.readAsText(file);
            }
        };

        function showStatus() {
            const sales = JSON.parse(localStorage.getItem('shakti_sales') || '[]');
            const inventory = JSON.parse(localStorage.getItem('shakti_inventory') || '{}');
            const udhaar = JSON.parse(localStorage.getItem('shakti_udhaar') || '[]');
            document.getElementById('status').innerHTML = `
                <div class="grid grid-cols-2 gap-2 text-sm">
                    <div>📦 Stock Items:</div><div class="font-bold">${Object.keys(inventory).length}</div>
                    <div>💰 Sales Records:</div><div class="font-bold">${sales.length}</div>
                    <div>📕 Udhaar Customers:</div><div class="font-bold">${udhaar.length}</div>
                    <div>💾 Last Backup:</div><div class="font-bold">${localStorage.getItem('shakti_last_backup') || 'Never'}</div>
                </div>
            `;
        }

        showStatus();
    </script>
</body>
</html>
