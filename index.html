<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHAKTI MOBILE - PRO DASHBOARD</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #0B111E; color: #E2E8F0; font-family: sans-serif; }
        .card-bg { background-color: #121A2E; border: 1px solid #1E293B; }
        .input-field { background-color: #0F172A; border: 1px solid #334155; color: white; }
        .modal-bg { background-color: rgba(11, 17, 30, 0.95); backdrop-filter: blur(8px); }
        .suggestion-box { background-color: #0F172A; border: 1px solid #334155; max-height: 150px; overflow-y: auto; z-index: 100; }
        .suggestion-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #1E293B; font-size: 12px; }
        .suggestion-item:hover { background-color: #1E293B; color: #3B82F6; }
    </style>
</head>
<body class="pb-24">

    <div id="loginScreen" class="fixed inset-0 z-[100] flex flex-col justify-center p-4 card-bg">
        <div class="text-center mb-8 text-3xl font-bold text-white">SHAKTI <span class="text-blue-500">MOBILE</span></div>
        <input type="tel" id="mobileNumber" value="8401463902" class="w-full input-field rounded-xl py-4 px-4 text-center text-lg">
        <button id="sendOtpBtn" onclick="sendOTPToken()" class="w-full bg-blue-600 py-4 rounded-xl mt-4 font-bold">SEND OTP</button>
        <div id="otpInputDiv" class="hidden mt-6">
            <input type="number" id="otpCode" placeholder="Enter OTP" class="w-full input-field rounded-xl py-4 px-4 text-center text-lg">
            <button onclick="handleVerifyLogin()" class="w-full bg-emerald-600 py-4 rounded-xl mt-4 font-bold">VERIFY & LOGIN</button>
        </div>
    </div>

    <div id="dashboardContent" class="hidden p-4 max-w-md mx-auto">
        <div id="dashboardDataRoot"></div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-[#121A2E] border-t border-slate-800 flex justify-around items-center h-16 shadow-2xl max-w-md mx-auto z-50">
        <a href="#" class="flex flex-col items-center justify-center w-full h-full text-blue-500" onclick="playClickSound()"><i class="fa-solid fa-house text-lg"></i><span class="text-[9px] mt-0.5 font-bold">Home</span></a>
        <a href="#" class="flex flex-col items-center justify-center w-full h-full text-gray-400" onclick="playClickSound(); openModal('stockModal')"><i class="fa-solid fa-box text-lg"></i><span class="text-[9px] mt-0.5 font-bold">Stock</span></a>
        
        <button onclick="playClickSound(); openModal('saleModal')" class="bg-blue-600 text-white rounded-full w-14 h-14 flex items-center justify-center -mt-8 border-4 border-[#0B111E] shadow-lg">
            <i class="fa-solid fa-plus text-2xl"></i>
        </button>
        
        <a href="#" class="flex flex-col items-center justify-center w-full h-full text-gray-400" onclick="playClickSound(); openModal('udhaarModal')"><i class="fa-solid fa-user-pen text-lg"></i><span class="text-[9px] mt-0.5 font-bold">Udhaar</span></a>
        <a href="#" class="flex flex-col items-center justify-center w-full h-full text-gray-400" onclick="playClickSound(); document.getElementById('reportSection').scrollIntoView({behavior: 'smooth'})"><i class="fa-solid fa-chart-line text-lg"></i><span class="text-[9px] mt-0.5 font-bold">Reports</span></a>
    </nav>

    <script type="module">
        // Puraana 800+ line ka logic aur functions yahan paste kijiye
        // Bus login function aur openModal mein playClickSound() add kar dena!
        window.playClickSound = function() {
            try { new AudioContext().createOscillator().start(); } catch(e){}
        };
    </script>
</body>
</html>
