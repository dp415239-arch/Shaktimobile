<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHAKTI MOBILE - Live Sync Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBFM1JgizFIwUtI2uX9tQ2ZWv2Mlb_RtHo",
            authDomain: "shakti-mobile-dashboard.firebaseapp.com",
            projectId: "shakti-mobile-dashboard",
            storageBucket: "shakti-mobile-dashboard.firebasestorage.app",
            messagingSenderId: "998376457559",
            appId: "1:998376457559:web:6c8a7ce0d47158fbbcea12",
            measurementId: "G-5VPD59Z3QM"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db; window.doc = doc; window.setDoc = setDoc; window.onSnapshot = onSnapshot;

        window.addEventListener('load', () => {
            setTimeout(() => { if (typeof window.setupRealtimeSync === "function") window.setupRealtimeSync(); }, 200);
        });
    </script>

    <style>
        body { background-color: #0B111E; color: #FFFFFF; font-family: 'Segoe UI', Roboto, sans-serif; }
        .card-bg { background-color: #121A2E; border: 1px solid #1E293B; }
        .input-field { background-color: #0F172A; border: 1px solid #334155; color: white; }
        .input-field:focus { border-color: #3B82F6; outline: none; }
        .modal-bg { background-color: rgba(11, 17, 30, 0.85); backdrop-filter: blur(4px); }
        .alert-blink { border: 2px solid #EF4444; animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { border-color: transparent; } }
    </style>
</head>
<body class="p-4 max-w-md mx-auto pb-32">

    <div id="dashboardContent">
        
        <div class="flex justify-between items-center mb-5">
            <div>
                <h1 class="text-xl font-bold tracking-wide text-white">SHAKTI <span class="text-blue-500">MOBILE</span></h1>
                <p class="text-xs text-gray-400 uppercase tracking-widest" style="font-size: 0.65rem;">Trust • Quality • Service</p>
            </div>
            <div class="text-right">
                <span class="bg-slate-800 text-gray-300 text-[10px] px-2 py-0.5 rounded font-mono">10 Jun 2026</span>
                <p class="text-[10px] text-emerald-400 font-medium mt-1"><i class="fa-solid fa-circle-check"></i> Connected</p>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-4">
            <div class="card-bg p-3 rounded-xl">
                <p class="text-[11px] text-gray-400 uppercase">Today's Sale</p>
                <p id="todaySale" class="text-xl font-bold text-blue-500">₹0</p>
                <p id="todayOrders" class="text-xs text-gray-500">0 Orders</p>
            </div>
            <div class="card-bg p-3 rounded-xl">
                <p class="text-[11px] text-gray-400 uppercase">Today's Profit</p>
                <p id="todayProfit" class="text-xl font-bold text-emerald-500">₹0</p>
                <p class="text-xs text-gray-500">Live Sync Active</p>

        <div class="card-bg p-4 rounded-xl mb-4 border-l-4 border-rose-500">
            <div class="flex justify-between items-center">
                <div>
                    <p class="text-xs text-gray-400 uppercase tracking-wider">Total Market Udhaar Pending</p>
                    <p id="totalUdhaarValuation" class="text-xl font-bold text-rose-400 font-mono">₹0</p>

                <i class="fa-solid fa-hand-holding-dollar text-rose-500 text-2xl"></i>

        <div class="card-bg p-4 rounded-xl mb-4">
            <h3 class="text-xs font-semibold text-gray-300 uppercase tracking-wider mb-2">Stock Inventory</h3>
            <div class="mb-3 grid grid-cols-3 gap-1.5">
                <select id="stockSearchType" class="input-field rounded-lg p-2 text-xs col-span-1">
                    <option value="model">Model</option> <option value="brand">Brand</option> <option value="imei">IMEI</option>
                </select>
                <input type="text" id="searchStockInp" oninput="renderStockTable()" placeholder="Search stock..." class="w-full input-field rounded-lg py-2 col-span-2 pl-3 text-xs">
            </div>
            <div id="stockContainer" class="space-y-2 text-xs max-h-40 overflow-y-auto"></div>
        </div>

        <div class="card-bg p-4 rounded-xl mb-4">
            <h3 class="text-xs font-semibold text-gray-300 uppercase tracking-wider mb-2"><i class="fa-solid fa-book-bookmark text-rose-400 mr-1"></i> Udhaar Box Register</h3>
            <div class="mb-2">
                <input type="text" id="searchUdhaarInp" oninput="renderUdhaarTable()" placeholder="Search Customer Name or Number..." class="w-full input-field rounded-lg p-2 text-xs">
            </div>
            <div id="udhaarContainer" class="space-y-3 max-h-64 overflow-y-auto pt-1">
                </div>
        </div>

        <div class="card-bg p-4 rounded-xl mb-4">
            <h3 class="text-xs font-semibold text-gray-300 uppercase tracking-wider mb-2">Sales Log</h3>
            <div class="overflow-x-auto"><table class="w-full text-left text-xs"><tbody id="logTableBody" class="divide-y divide-slate-900"></tbody></table></div>
        </div>

    </div>

    <div id="udhaarModal" class="fixed inset-0 modal-bg z-50 hidden flex items-center justify-center p-4">
        <div class="card-bg w-full max-w-sm rounded-2xl p-5 shadow-2xl space-y-3">
            <div class="flex justify-between items-center border-b border-slate-800 pb-2">
                <h3 id="udhaarModalTitle" class="text-sm font-bold text-rose-400 uppercase">🔴 Add New Udhaar Record</h3>
                <button onclick="closeModal('udhaarModal')" class="text-gray-400 text-lg font-bold">×</button>
            </div>
            <input type="hidden" id="editUdhaarId">
            <div class="space-y-2 text-xs">
                <div>
                    <label class="block text-[10px] text-gray-400 mb-1">Udhaar Date</label>
                    <input type="date" id="udhaarDate" class="w-full input-field rounded-lg p-2 font-mono">
                </div>
                <input type="text" id="udhaarCustomerName" placeholder="Customer Full Name" class="w-full input-field rounded-lg p-2">
                <input type="tel" id="udhaarCustomerPhone" placeholder="Customer Mobile Number" class="w-full input-field rounded-lg p-2 font-mono">
                <input type="text" id="udhaarCompanyName" placeholder="Company/Brand Name (e.g. Vivo)" class="w-full input-field rounded-lg p-2">
                <input type="text" id="udhaarProductName" placeholder="Product Model Name (e.g. Y200)" class="w-full input-field rounded-lg p-2">
                
                <div class="grid grid-cols-2 gap-2">
                    <input type="number" id="udhaarTotalPrice" placeholder="Product Total Price (₹)" class="w-full input-field rounded-lg p-2 font-mono">
                    <input type="number" id="udhaarJamaPrice" value="0" placeholder="Jama Amount (₹)" class="w-full input-field rounded-lg p-2 font-mono">
                </div>
                
                <div>
                    <label class="block text-[10px] text-gray-400 mb-1">Customer Photo</label>
                    <input type="file" id="udhaarPhotoFile" accept="image/*" class="w-full text-xs text-gray-400 file:mr-2 file:py-1 file:px-2 file:rounded-md file:border-0 file:text-xs file:font-semibold file:bg-slate-800 file:text-gray-300">
                    <input type="hidden" id="udhaarPhotoBase64">
                </div>
            </div>
            <button onclick="submitUdhaarForm()" class="w-full bg-rose-600 text-white font-bold p-2.5 rounded-lg text-xs mt-2">SAVE UDHAAR ENTRY</button>
        </div>
    </div>

    <div id="saleModal" class="fixed inset-0 modal-bg z-50 hidden flex items-center justify-center p-4">
        <div class="card-bg w-full max-w-sm rounded-2xl p-5 shadow-2xl space-y-3">
            <div class="flex justify-between items-center border-b border-slate-800 pb-2">
                <h3 id="saleModalTitle" class="text-sm font-bold text-emerald-400 uppercase">🟢 Add New Sale</h3>
                <button onclick="closeModal('saleModal')" class="text-gray-400 text-lg font-bold">×</button>
            </div>
            <input type="hidden" id="editSaleId">
            <div class="space-y-2 text-xs">
                <input type="date" id="saleDate" class="w-full input-field rounded-lg p-2 font-mono">
                <input type="text" id="modelBrand" placeholder="Brand Name" class="w-full input-field rounded-lg p-2">
                <input type="text" id="modelName" placeholder="Model Name" class="w-full input-field rounded-lg p-2">
                <input type="text" id="modelImei" placeholder="IMEI / Serial Number" class="w-full input-field rounded-lg p-2 font-mono">
                <div class="grid grid-cols-2 gap-2">
                    <input type="number" id="quantity" value="1" class="w-full input-field rounded-lg p-2 font-mono">
                    <select id="paymentMode" class="w-full input-field rounded-lg p-2">
                        <option value="UPI">UPI</option> <option value="Cash">Cash</option> <option value="Udhaar">Udhaar</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <input type="number" id="costPrice" placeholder="Cost Price (₹)" class="w-full input-field rounded-lg p-2 font-mono">
                    <input type="number" id="salePrice" placeholder="Sale Price (₹)" class="w-full input-field rounded-lg p-2 font-mono">
                </div>
            </div>
            <button onclick="submitSaleForm()" class="w-full bg-emerald-600 text-white font-bold p-2.5 rounded-lg text-xs mt-2">SAVE TRANSACTION</button>
        </div>
    </div>

    <div id="stockModal" class="fixed inset-0 modal-bg z-50 hidden flex items-center justify-center p-4">
        <div class="card-bg w-full max-w-sm rounded-2xl p-5 shadow-2xl space-y-3">
            <div class="flex justify-between items-center border-b border-slate-800 pb-2">
                <h3 id="stockModalTitle" class="text-sm font-bold text-blue-400 uppercase">🔵 Add/Update Stock</h3>
                <button onclick="closeModal('stockModal')" class="text-gray-400 text-lg font-bold">×</button>
            </div>
            <input type="hidden" id="editStockKey">
            <div class="space-y-2 text-xs">
                <input type="text" id="stockBrand" placeholder="Brand Name" class="w-full input-field rounded-lg p-2">
                <input type="text" id="stockModelName" placeholder="Model Name" class="w-full input-field rounded-lg p-2">
                <input type="text" id="stockImei" placeholder="IMEI / Serial Code" class="w-full input-field rounded-lg p-2 font-mono">
                <div class="grid grid-cols-2 gap-2">
                    <input type="number" id="stockCount" placeholder="Quantity" class="w-full input-field rounded-lg p-2 font-mono">
                    <input type="number" id="stockPriceInp" placeholder="Cost Price (₹)" class="w-full input-field rounded-lg p-2 font-mono">
                </div>
            </div>
            <button onclick="submitStockForm()" class="w-full bg-blue-600 text-white font-bold p-2.5 rounded-lg text-xs mt-2">SAVE INVENTORY</button>
        </div>
    </div>

    <div id="expenseModal" class="fixed inset-0 modal-bg z-50 hidden flex items-center justify-center p-4">
        <div class="card-bg w-full max-w-sm rounded-2xl p-5 shadow-2xl space-y-3">
            <div class="flex justify-between items-center border-b border-slate-800 pb-2">
                <h3 class="text-sm font-bold text-amber-500 uppercase">🟠 Add Shop Expense</h3>
                <button onclick="closeModal('expenseModal')" class="text-gray-400 text-lg font-bold">×</button>
            </div>
            <div class="space-y-2 text-xs">
                <input type="text" id="expenseName" placeholder="Expense Name" class="w-full input-field rounded-lg p-2">
                <input type="number" id="expenseAmount" placeholder="Amount (₹)" class="w-full input-field rounded-lg p-2 font-mono">
            </div>
            <button onclick="addExpense()" class="w-full bg-amber-600 text-white font-bold p-2.5 rounded-lg text-xs mt-2">SAVE EXPENSE</button>
        </div>
    </div>


    <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto card-bg p-2.5 grid grid-cols-4 gap-1.5 border-t border-slate-800 z-40 text-[11px] font-bold">
        <button onclick="openModal('saleModal')" class="bg-emerald-600 py-3 rounded-xl flex flex-col items-center justify-center">🟢 Sale</button>
        <button onclick="openModal('stockModal')" class="bg-blue-600 py-3 rounded-xl flex flex-col items-center justify-center">🔵 Stock</button>
        <button onclick="openModal('expenseModal')" class="bg-amber-600 py-3 rounded-xl flex flex-col items-center justify-center">🟠 Exp</button>
        <button onclick="openModal('udhaarModal')" class="bg-rose-600 py-3 rounded-xl flex flex-col items-center justify-center">🔴 Udhaar</button>
    </div>


    <script>
        let salesData = []; let expenseData = []; let inventory = {}; let udhaarData = []; let myChart = null;

        // Image processor file converter logic
        document.getElementById('udhaarPhotoFile').addEventListener('change', function(e) {
            let file = e.target.files[0];
            if (file) {
                let reader = new FileReader();
                reader.onload = function(event) { document.getElementById('udhaarPhotoBase64').value = event.target.result; };
                reader.readAsDataURL(file);
            }
        });

        function openModal(id) { 
            document.getElementById(id).classList.remove('hidden'); 
            if(id === 'saleModal') { document.getElementById('saleModalTitle').innerText = "🟢 Add New Sale"; document.getElementById('editSaleId').value = ""; document.getElementById('saleDate').value = "2026-06-10"; }
            else if(id === 'stockModal') { document.getElementById('stockModalTitle').innerText = "🔵 Add/Update Stock"; document.getElementById('editStockKey').value = ""; }
            else if(id === 'udhaarModal') { document.getElementById('udhaarModalTitle').innerText = "🔴 Add New Udhaar Record"; document.getElementById('editUdhaarId').value = ""; document.getElementById('udhaarDate').value = "2026-06-10"; document.getElementById('udhaarPhotoBase64').value = ""; }
        }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        // REALTIME FIREBASE STREAM
        window.setupRealtimeSync = function() {
            if (!window.onSnapshot || !window.db) return;
            window.onSnapshot(window.doc(window.db, "shaktiMobile", "dashboardData"), (docSnap) => {
                if (docSnap.exists()) {
                    let c = docSnap.data();
                    salesData = c.salesData || []; expenseData = c.expenseData || []; inventory = c.inventory || {}; udhaarData = c.udhaarData || [];
                } else {
                    salesData = []; expenseData = []; inventory = {}; udhaarData = []; syncToCloud();
                }
                updateDashboardUI();
            });
        }

        async function syncToCloud() {
            if (window.setDoc && window.db) {
                await window.setDoc(window.doc(window.db, "shaktiMobile", "dashboardData"), { salesData, expenseData, inventory, udhaarData });
            }
        }

        // NEW: SUBMIT & EDIT FOR UDHAAR FORM REGISTER
        function submitUdhaarForm() {
            let id = document.getElementById('editUdhaarId').value;
            let date = document.getElementById('udhaarDate').value;
            let name = document.getElementById('udhaarCustomerName').value.trim();
            let phone = document.getElementById('udhaarCustomerPhone').value.trim();
            let company = document.getElementById('udhaarCompanyName').value.trim();
            let product = document.getElementById('udhaarProductName').value.trim();
            let total = parseFloat(document.getElementById('udhaarTotalPrice').value) || 0;
            let jama = parseFloat(document.getElementById('udhaarJamaPrice').value) || 0;
            let photo = document.getElementById('udhaarPhotoBase64').value;

            if(!name || total <= 0) { alert("Please input proper customer name and total amount!"); return; }

            if(id) {
                udhaarData = udhaarData.map(x => x.id == id ? { id: Number(id), date, name, phone, company, product, total, jama, photo: photo || x.photo } : x);
            } else {
                udhaarData.push({ id: Date.now(), date, name, phone, company, product, total, jama, photo });
            }

            closeModal('udhaarModal');
            syncToCloud();
        }

        function openEditUdhaar(id) {
            let item = udhaarData.find(x => x.id == id);
            document.getElementById('udhaarModalTitle').innerText = "✏️ Edit Udhaar Details / Jama";
            document.getElementById('editUdhaarId').value = id;
            document.getElementById('udhaarDate').value = item.date;
            document.getElementById('udhaarCustomerName').value = item.name;
            document.getElementById('udhaarCustomerPhone').value = item.phone;
            document.getElementById('udhaarCompanyName').value = item.company;
            document.getElementById('udhaarProductName').value = item.product;
            document.getElementById('udhaarTotalPrice').value = item.total;
            document.getElementById('udhaarJamaPrice').value = item.jama;
            document.getElementById('udhaarPhotoBase64').value = item.photo || "";
            document.getElementById('udhaarModal').classList.remove('hidden');
        }

        function deleteUdhaarItem(id) {
            if(confirm("Remove this Udhaar record completely?")) { udhaarData = udhaarData.filter(x => x.id !== id); syncToCloud(); }
        }

        // RENDERS DYNAMIC UDHAAR REGISTER CARDS WITH 1-MONTH RED ALERT LIMIT TIMER
        function renderUdhaarTable() {
            const container = document.getElementById('udhaarContainer');
            const kw = document.getElementById('searchUdhaarInp').value.toLowerCase();
            container.innerHTML = '';
            let totalPendingMarket = 0;

            let filtered = udhaarData.filter(x => x.name.toLowerCase().includes(kw) || x.phone.includes(kw));

            if(filtered.length === 0) {
                container.innerHTML = `<p class="text-center text-gray-500 italic py-2">No matching Udhaar data found</p>`;
                document.getElementById('totalUdhaarValuation').innerText = "₹0";
                return;
            }

            filtered.reverse().forEach(x => {
                let pendingAmount = x.total - x.jama;
                totalPendingMarket += pendingAmount;

                // 1 Month (30 Days) alert notification trigger tracker check
                let udhaarDateObj = new Date(x.date);
                let currentSystemDate = new Date("2026-06-10");
                let differenceInTime = currentSystemDate.getTime() - udhaarDateObj.getTime();
                let totalDaysPassed = Math.floor(differenceInTime / (1000 * 300 * 60 * 24)); // Calculate days passed

                let isOverdue = totalDaysPassed >= 30 && pendingAmount > 0;
                let fallbackPhoto = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' fill='%23475569' viewBox='0 0 24 24'><path d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5-4-8-4y'/></svg>";

                const div = document.createElement('div');
                div.className = `card-bg p-3 rounded-xl flex gap-3 relative ${isOverdue ? 'alert-blink' : ''}`;
                div.innerHTML = `
                    <img src="${x.photo || fallbackPhoto}" class="w-12 h-12 rounded-full object-cover bg-slate-900 border border-slate-700">
                    <div class="flex-1 text-xs">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="font-bold text-gray-200 text-sm">${x.name}</p>
                                <p class="text-gray-400 font-mono">${x.phone || 'No Number'}</p>
                            </div>
                            <div class="flex gap-1.5">
                                <button onclick="openEditUdhaar(${x.id})" class="text-blue-400 text-xs"><i class="fa-solid fa-pen-to-square"></i></button>
                                <button onclick="deleteUdhaarItem(${x.id})" class="text-rose-500 text-xs"><i class="fa-solid fa-trash"></i></button>
                            </div>
                        </div>
                        <div class="mt-1 bg-slate-900/50 p-1.5 rounded border border-slate-800 grid grid-cols-2 gap-1 text-[11px]">
                            <div>Item: <span class="font-semibold text-gray-300">${x.company} ${x.product}</span></div>
                            <div class="text-right">Total: <span class="font-mono font-bold text-blue-400">₹${x.total}</span></div>
                            <div>Jama: <span class="font-mono font-bold text-emerald-400">₹${x.jama}</span></div>
                            <div class="text-right">Pending: <span class="font-mono font-bold text-rose-400">₹${pendingAmount}</span></div>
                        </div>
                        ${isOverdue ? `<p class="text-[10px] text-rose-400 font-bold mt-1 animate-pulse"><i class="fa-solid fa-triangle-exclamation"></i> OVERDUE ALERT: More than 1 Month!</p>` : ''}
                    </div>
                `;
                container.appendChild(div);
            });

            document.getElementById('totalUdhaarValuation').innerText = `₹${totalPendingMarket}`;
        }

        // REMAINS STANDARD REST OF THE CORE PLATFORM FORMS FUNCTIONS
        function submitStockForm() {
            let brand = document.getElementById('stockBrand').value.trim(); let model = document.getElementById('stockModelName').value.trim(); let imei = document.getElementById('stockImei').value.trim(); let qty = parseInt(document.getElementById('stockCount').value) || 0; let price = parseFloat(document.getElementById('stockPriceInp').value) || 0; let editKey = document.getElementById('editStockKey').value;
            if(!model || qty < 0) return; if(editKey && editKey !== model) { delete inventory[editKey]; }
            inventory[model] = { qty, price, brand, imei }; closeModal('stockModal'); syncToCloud();
        }
        function openEditStock(key) {
            let item = inventory[key]; document.getElementById('stockModalTitle').innerText = "✏️ Edit Stock Item"; document.getElementById('editStockKey').value = key; document.getElementById('stockBrand').value = item.brand || ""; document.getElementById('stockModelName').value = key; document.getElementById('stockImei').value = item.imei || ""; document.getElementById('stockCount').value = item.qty; document.getElementById('stockPriceInp').value = item.price; document.getElementById('stockModal').classList.remove('hidden');
        }
        function deleteStockItem(key) { if(confirm(`Remove?`)) { delete inventory[key]; syncToCloud(); } }

        function submitSaleForm() {
            let date = document.getElementById('saleDate').value; let brand = document.getElementById('modelBrand').value.trim(); let model = document.getElementById('modelName').value.trim(); let imei = document.getElementById('modelImei').value.trim(); let qty = parseInt(document.getElementById('quantity').value) || 0; let mode = document.getElementById('paymentMode').value; let cost = parseFloat(document.getElementById('costPrice').value) || 0; let sale = parseFloat(document.getElementById('salePrice').value) || 0; let editId = document.getElementById('editSaleId').value;
            if(!model || qty <= 0) return;
            if(editId) { salesData = salesData.map(item => item.id == editId ? { id: Number(editId), date, brand, model, imei, qty, mode, cost: cost*qty, sale: sale*qty } : item); }
            else { if(inventory[model]) { inventory[model].qty = Math.max(0, inventory[model].qty - qty); } salesData.push({ id: Date.now(), date, brand, model, imei, qty, mode, cost: cost*qty, sale: sale*qty }); }
            closeModal('saleModal'); syncToCloud();
        }
        function openEditSale(id) {
            let item = salesData.find(x => x.id == id); document.getElementById('saleModalTitle').innerText = "✏️ Edit Sales Entry"; document.getElementById('editSaleId').value = id; document.getElementById('saleDate').value = item.date; document.getElementById('modelBrand').value = item.brand || ""; document.getElementById('modelName').value = item.model; document.getElementById('modelImei').value = item.imei || ""; document.getElementById('quantity').value = item.qty; document.getElementById('paymentMode').value = item.mode; document.getElementById('costPrice').value = item.cost / item.qty; document.getElementById('salePrice').value = item.sale / item.qty; document.getElementById('saleModal').classList.remove('hidden');
        }
        function deleteSale(id) { if(confirm("Delete?")) { salesData = salesData.filter(x => x.id !== id); syncToCloud(); } }

        function addExpense() {
            let name = document.getElementById('expenseName').value.trim(); let amount = parseFloat(document.getElementById('expenseAmount').value) || 0; if(!name || amount <= 0) return;
            expenseData.push({ id: Date.now(), name, amount, date: "2026-06-10" }); closeModal('expenseModal'); syncToCloud();
        }
        function deleteExpense(id) { if(confirm("Remove?")) { expenseData = expenseData.filter(x => x.id !== id); syncToCloud(); } }

        function updateDashboardUI() {
            let tSale = 0; let tProfit = 0; let tOrders = 0; let mSale = 0; let mProfit = 0; let uSold = 0; let cCost = 0; let expT = 0;
            salesData.forEach(x => { let p = x.sale - x.cost; if(x.date === "2026-06-10") { tSale += x.sale; tProfit += p; tOrders++; } mSale += x.sale; mProfit += p; uSold += x.qty; cCost += x.cost; });
            expenseData.forEach(e => expT += e.amount);
            document.getElementById('todaySale').innerText = `₹${tSale}`; document.getElementById('todayProfit').innerText = `₹${tProfit}`; document.getElementById('todayOrders').innerText = `${tOrders} Orders`;
            renderStockTable(); renderLog(); renderExpenseLog(); renderTopProducts(); renderUdhaarTable();
            if(myChart) myChart.destroy();
            const ctx = document.getElementById('analyticsChart').getContext('2d');
            myChart = new Chart(ctx, { type: 'doughnut', data: { labels: ['Stock Cost', 'Expenses', 'Net Profit'], datasets: [{ data: [cCost||1, expT||1, mProfit-expT>0?mProfit-expT:0], backgroundColor: ['#3B82F6', '#F43F5E', '#10B981'], borderWidth: 0 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { color: '#94A3B8', font: { size: 10 } } } } } });
        }

        function renderStockTable() {
            const container = document.getElementById('stockContainer'); const searchKeyword = document.getElementById('searchStockInp').value.toLowerCase(); const searchType = document.getElementById('stockSearchType').value; container.innerHTML = ''; let val = 0;
            for (const [model, data] of Object.entries(inventory)) {
                let count = data.qty || 0; let price = data.price || 0; let brand = data.brand || ""; let imei = data.imei || ""; val += (count * price);
                let match = false; if(searchType === 'model' && model.toLowerCase().includes(searchKeyword)) match = true; if(searchType === 'brand' && brand.toLowerCase().includes(searchKeyword)) match = true; if(searchType === 'imei' && imei.toLowerCase().includes(searchKeyword)) match = true;
                if (match) {
                    const div = document.createElement('div'); div.className = "card-bg p-2.5 rounded-lg border border-slate-800 flex justify-between items-center";
                    div.innerHTML = `<div><span class="text-[9px] text-blue-400 font-bold uppercase">${brand}</span><p class="font-bold text-gray-200">${model}</p></div><div class="flex items-center gap-1"><span class="bg-slate-900 px-2 py-0.5 rounded font-mono">${count} Left</span><button onclick="openEditStock('${model}')" class="text-blue-400 px-1"><i class="fa-solid fa-pen-to-square"></i></button><button onclick="deleteStockItem('${model}')" class="text-rose-500 px-1"><i class="fa-solid fa-trash"></i></button></div>`;
                    container.appendChild(div);
                }
            }
        }

        function renderLog() {
            const tbody = document.getElementById('logTableBody'); tbody.innerHTML = '';
            salesData.slice(-5).reverse().forEach(x => {
                let tr = document.createElement('tr');
                tr.innerHTML = `<td class="py-2 font-semibold text-gray-200 text-xs">${x.model}</td><td class="py-2 text-center font-mono">${x.qty}</td><td class="py-2 text-right font-bold text-blue-400">₹${x.sale}</td><td class="py-2 text-center"><button onclick="openEditSale(${x.id})" class="text-blue-400 mx-0.5"><i class="fa-solid fa-pen-to-square"></i></button><button onclick="deleteSale(${x.id})" class="text-rose-500 mx-0.5"><i class="fa-solid fa-trash-can"></i></button></td>`;
                tbody.appendChild(tr);
            });
        }
        function renderExpenseLog() { let tbody = document.getElementById('expenseTableBody'); tbody.innerHTML = ''; expenseData.slice(-3).reverse().forEach(x => { let tr = document.createElement('tr'); tr.innerHTML = `<td class="py-1 text-gray-300">${x.name}</td><td class="py-1 text-right font-mono text-rose-400">₹${x.amount}</td><td class="py-1 text-center"><button onclick="deleteExpense(${x.id})" class="text-rose-500"><i class="fa-solid fa-trash-can"></i></button></td>`; tbody.appendChild(tr); }); }
        function renderTopProducts() { let container = document.getElementById('topProductsContainer'); container.innerHTML = ''; let cnts = {}; salesData.forEach(x => cnts[x.model] = (cnts[x.model] || 0) + x.qty); Object.entries(cnts).sort((a,b)=>b[1]-a[1]).slice(0,2).forEach(([m, q], i) => { let d = document.createElement('div'); d.className = "bg-slate-900/40 p-1.5 rounded-lg flex justify-between"; d.innerHTML = `<span>#${i+1} ${m}</span><span class="text-blue-400 font-bold">${q} sold</span>`; container.appendChild(d); }); }
    </script>
</body>
</html>
