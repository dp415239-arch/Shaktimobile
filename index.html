<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHAKTI MOBILE - Full Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBFM1JgizFIwUtI2uX9tQ2ZWv2Mlb_RtHo",
            authDomain: "shakti-mobile-dashboard.firebaseapp.com",
            projectId: "shakti-mobile-dashboard",
            storageBucket: "shakti-mobile-dashboard.firebasestorage.app",
            messagingSenderId: "998376457559",
            appId: "1:998376457559:web:6c8a7ce0d47158fbbcea12",
            measurementId: "G-5VPD59Z3QM"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db; window.doc = doc; window.setDoc = setDoc; window.onSnapshot = onSnapshot;

        window.addEventListener('load', () => { 
            if (localStorage.getItem('isLoggedIn') === 'true') { showDashboard(); }
            setTimeout(() => { if (typeof window.setupRealtimeSync === "function") window.setupRealtimeSync(); }, 200); 
        });
    </script>

    <style>
        body { background-color: #0B111E; color: #E2E8F0; font-family: 'Segoe UI', sans-serif; }
        .card-bg { background-color: #121A2E; border: 1px solid #1E293B; }
        .input-field { background-color: #0F172A; border: 1px solid #334155; color: white; }
        .modal-bg { background-color: rgba(11, 17, 30, 0.95); backdrop-filter: blur(8px); }
        .suggestion-box { background-color: #0F172A; border: 1px solid #334155; max-height: 150px; overflow-y: auto; z-index: 100; }
        .suggestion-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #1E293B; font-size: 12px; }
        .suggestion-item:hover { background-color: #1E293B; color: #3B82F6; }
    </style>
</head>
<body class="pb-24">

    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="flex flex-col justify-center min-h-[100vh] p-4 max-w-md mx-auto">
        <div class="card-bg p-8 rounded-3xl shadow-2xl border border-slate-800 text-center">
            <h1 class="text-3xl font-bold text-white mb-6">SHAKTI <span class="text-blue-500">MOBILE</span></h1>
            <div id="mobileInputDiv">
                <input type="tel" id="mobileNumber" value="8401463902" class="w-full input-field rounded-xl py-3 px-4 text-center text-lg">
                <button onclick="sendOTPToken()" class="w-full bg-blue-600 py-3 rounded-xl mt-4 font-bold text-white">SEND OTP</button>
            </div>
            <div id="otpInputDiv" class="hidden mt-6">
                <input type="number" id="otpCode" placeholder="Enter OTP (1234)" class="w-full input-field rounded-xl py-3 px-4 text-center text-lg">
                <button onclick="handleVerifyLogin()" class="w-full bg-emerald-600 py-3 rounded-xl mt-4 font-bold text-white">VERIFY & LOGIN</button>
            </div>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div id="dashboardContent" class="hidden p-4 max-w-md mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-bold text-white">SHAKTI <span class="text-blue-500">MOBILE</span></h1>
            <span id="liveHeaderDate" class="bg-slate-800 text-[10px] px-3 py-1 rounded-full text-gray-300"></span>
        </div>
        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="card-bg p-4 rounded-2xl"><p class="text-[10px] uppercase text-gray-500">Today's Sale</p><p id="todaySale" class="text-2xl font-bold text-white">₹0</p></div>
            <div class="card-bg p-4 rounded-2xl"><p class="text-[10px] uppercase text-gray-500">Today's Profit</p><p id="todayProfit" class="text-2xl font-bold text-emerald-400">₹0</p></div>
        </div>
        <div id="stockContainer" class="space-y-3 mb-6"></div>
        <div id="udhaarContainer" class="space-y-3 mb-6"></div>
        <div id="reportSection" class="card-bg p-5 rounded-2xl mb-6">...Reports...</div>
        <div id="logTableBody" class="space-y-3 mb-20">...Sales Logs...</div>
    </div>

    <!-- PREMIUM NAVIGATION -->
    <nav class="fixed bottom-0 left-0 right-0 bg-[#121A2E] border-t border-slate-800 flex justify-around items-center h-16 shadow-2xl max-w-md mx-auto z-50">
        <a href="#" class="flex flex-col items-center justify-center w-full h-full text-blue-500" onclick="playClickSound()"><i class="fa-solid fa-house text-lg"></i><span class="text-[9px] mt-0.5 font-bold">Home</span></a>
        <a href="#" class="flex flex-col items-center justify-center w-full h-full text-gray-500 hover:text-blue-400" onclick="playClickSound(); openModal('stockModal')"><i class="fa-solid fa-box text-lg"></i><span class="text-[9px] mt-0.5 font-bold">Stock</span></a>
        <button onclick="playClickSound(); openModal('saleModal')" class="bg-blue-600 text-white rounded-full w-14 h-14 flex items-center justify-center -mt-8 border-4 border-[#0B111E] shadow-lg"><i class="fa-solid fa-plus text-2xl"></i></button>
        <a href="#" class="flex flex-col items-center justify-center w-full h-full text-gray-500 hover:text-rose-400" onclick="playClickSound(); openModal('udhaarModal')"><i class="fa-solid fa-user-pen text-lg"></i><span class="text-[9px] mt-0.5 font-bold">Udhaar</span></a>
        <a href="#" class="flex flex-col items-center justify-center w-full h-full text-gray-500 hover:text-blue-400" onclick="playClickSound(); document.getElementById('reportSection').scrollIntoView({behavior: 'smooth'})"><i class="fa-solid fa-chart-line text-lg"></i><span class="text-[9px] mt-0.5 font-bold">Reports</span></a>
    </nav>

    <script>
        let generatedOTP = null;
        function sendOTPToken() {
            let mobile = document.getElementById('mobileNumber').value.trim();
            if (mobile !== '8401463902') { alert("Invalid Number!"); return; }
            generatedOTP = Math.floor(1000 + Math.random() * 9000); 
            alert(`OTP: ${generatedOTP}`);
            document.getElementById('mobileInputDiv').classList.add('hidden'); 
            document.getElementById('otpInputDiv').classList.remove('hidden');
        }
        function handleVerifyLogin() {
            let InpCode = document.getElementById('otpCode').value.trim();
            if (InpCode === String(generatedOTP) || InpCode === '1234') { 
                localStorage.setItem('isLoggedIn', 'true'); showDashboard(); 
            } else { alert("Wrong OTP!"); }
        }
        function showDashboard() { 
            document.getElementById('loginScreen').style.display = 'none'; 
            document.getElementById('dashboardContent').classList.remove('hidden'); 
            document.getElementById('liveHeaderDate').innerText = new Date().toLocaleDateString('en-IN');
        }
        function playClickSound() {
            let context = new (window.AudioContext || window.webkitAudioContext)();
            let osc = context.createOscillator(); osc.frequency.setValueAtTime(800, context.currentTime); osc.connect(context.destination); osc.start(); osc.stop(context.currentTime + 0.05);
        }
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); playClickSound(); }
        // ... (Baaki saare purane functions updateDashboardUI, renderLog, etc. yahan rakhein)
    </script>
</body>
</html>
