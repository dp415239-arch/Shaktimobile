<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SHAKTI_MOBILE_V7.html</title>
<style>
body{margin:0;background:#0a0f1f;color:white;font-family:Arial}
.header{padding:20px;text-align:center;background:linear-gradient(135deg,#111827,#312e81)}
.logo{width:90px;height:90px;border-radius:22px;margin:auto;
background:linear-gradient(135deg,#f59e0b,#fde68a);
display:flex;align-items:center;justify-content:center;
font-size:38px;font-weight:bold;color:#111}
.wrap{padding:12px}
.card{background:#111827;border-radius:20px;padding:14px;margin-bottom:12px;
box-shadow:0 10px 20px rgba(0,0,0,.4)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.big{font-size:24px;font-weight:bold}
input,button,select{
width:100%;padding:12px;margin:5px 0;border:none;border-radius:12px;box-sizing:border-box}
button{background:linear-gradient(135deg,#2563eb,#9333ea);color:#fff}
.chart{height:140px;display:flex;align-items:flex-end;gap:6px}
.bar{flex:1;background:linear-gradient(#60a5fa,#8b5cf6);border-radius:8px 8px 0 0}
.item{padding:8px;border-bottom:1px solid #243041}
</style>
</head>
<body>
<div class="header">
<div class="logo">SM</div>
<h2>SHAKTI MOBILE</h2>
</div>

<div class="wrap">
<div class="grid">
<div class="card"><div>Today Sale</div><div id="todaySale" class="big">₹0</div></div>
<div class="card"><div>Today Profit</div><div id="todayProfit" class="big">₹0</div></div>
</div>

<div class="grid">
<div class="card"><div>Month Sale</div><div id="monthSale" class="big">₹0</div></div>
<div class="card"><div>Month Profit</div><div id="monthProfit" class="big">₹0</div></div>
</div>

<div class="card">
🏆 Top Selling Product<br><b id="topSelling">No Data</b>
</div>

<div class="card">
💰 Most Profitable Product<br><b id="topProfit">No Data</b>
</div>

<div class="card">
<h3>6 Month Profit Chart</h3>
<div class="chart">
<div class="bar" style="height:25%"></div>
<div class="bar" style="height:40%"></div>
<div class="bar" style="height:55%"></div>
<div class="bar" style="height:70%"></div>
<div class="bar" style="height:90%"></div>
<div class="bar" style="height:65%"></div>
</div>
</div>

<div class="card">
<select id="monthFilter"></select>
<input id="date" type="date">
<input id="product" placeholder="Product Name">
<input id="qty" type="number" value="1" placeholder="Qty">
<input id="cost" type="number" placeholder="Cost Price">
<input id="sale" type="number" placeholder="Sale Price">
<button onclick="addSale()">➕ Add Sale</button>
</div>

<div class="card">
<h3>Sales History</h3>
<div id="history"></div>
</div>
</div>

<script>
date.value=new Date().toISOString().split('T')[0];
let sales=JSON.parse(localStorage.getItem('shakti_v7')||'[]');

function addSale(){
 let p=product.value.trim();
 let q=+qty.value||1;
 let c=+cost.value||0;
 let s=+sale.value||0;
 if(!p||!s) return;

 sales.push({
   date:date.value,
   product:p,
   qty:q,
   sale:s*q,
   profit:(s-c)*q
 });

 localStorage.setItem('shakti_v7',JSON.stringify(sales));
 render();
}

function render(){
 let today=new Date().toISOString().split('T')[0];
 let currentMonth=today.substring(0,7);

 let ts=0,tp=0,ms=0,mp=0;
 let qtyMap={}, profitMap={};
 let months=new Set([currentMonth]);
 let h='';

 sales.forEach(x=>{
   months.add(x.date.substring(0,7));
   if(x.date===today){ts+=x.sale;tp+=x.profit;}
   if(x.date.startsWith(currentMonth)){ms+=x.sale;mp+=x.profit;}
   qtyMap[x.product]=(qtyMap[x.product]||0)+x.qty;
   profitMap[x.product]=(profitMap[x.product]||0)+x.profit;
 });

 monthFilter.innerHTML=[...months].sort().reverse().map(m=>`<option>${m}</option>`).join('');
 let sel=monthFilter.value||currentMonth;

 sales.forEach(x=>{
   if(x.date.startsWith(sel)){
     h+=`<div class="item">${x.date}<br><b>${x.product}</b> Qty:${x.qty}<br>Sale ₹${x.sale} | Profit ₹${x.profit}</div>`;
   }
 });

 let best="No Data", bq=0;
 for(let k in qtyMap){if(qtyMap[k]>bq){bq=qtyMap[k];best=k+" ("+bq+")";}}

 let prof="No Data", bp=0;
 for(let k in profitMap){if(profitMap[k]>bp){bp=profitMap[k];prof=k+" (₹"+bp+")";}}

 todaySale.innerText='₹'+ts;
 todayProfit.innerText='₹'+tp;
 monthSale.innerText='₹'+ms;
 monthProfit.innerText='₹'+mp;
 topSelling.innerText=best;
 topProfit.innerText=prof;
 history.innerHTML=h||'No Sales';
}
render();
</script>
</body>
</html>
